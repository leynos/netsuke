netsuke_version: "1.0.0"
rules:
  - name: compile
    command: "echo $in {{ ins }} > $out"
targets:
  - name: out/app
    sources: src/main.c
    deps:
      - include/config.h
      - generated/stamp
    rule: compile
actions:
  - name: regenerate
    deps:
      - schemas/user.yml
      - tools/generator
    command: "echo $out"
