name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust: [stable, '1.89.0']
        # Nightly is experimental; stable and MSRV are the supported toolchains
        include:
          - os: ubuntu-latest
            rust: nightly
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      # Override rust-toolchain.toml to actually use the matrix toolchain
      RUSTUP_TOOLCHAIN: ${{ matrix.rust }}
    steps:
      - uses: actions/checkout@9bb56186c3b09b4f86b1c65136769dd318469633  # v4.1.2
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@42267e344b8153291c6ce9e8d87689ba374f21ee
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - name: Show rustc version
        run: |
          rustup show
          rustc --version
          cargo --version
      - name: Show Ninja version
        run: ninja --version
      - name: Format
        run: make check-fmt
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Test and Measure Coverage
        if: matrix.rust == 'stable'
        uses: leynos/shared-actions/.github/actions/generate-coverage@42267e344b8153291c6ce9e8d87689ba374f21ee
        with:
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: matrix.rust == 'stable' && env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@42267e344b8153291c6ce9e8d87689ba374f21ee
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

  kani-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: stable
      CARGO_HOME: ${{ github.workspace }}/.kani-cargo
      KANI_HOME: ${{ github.workspace }}/.kani-home
    steps:
      - uses: actions/checkout@9bb56186c3b09b4f86b1c65136769dd318469633  # v4.1.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@42267e344b8153291c6ce9e8d87689ba374f21ee
        with:
          toolchain: stable
      - name: Install uv
        uses: astral-sh/setup-uv@4cda7d73322c50eac316ad623a716f09a2db2ac7  # v3.1.2
      - name: Cache Kani tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            .kani-cargo
            .kani-home
          key: ${{ runner.os }}-kani-${{ hashFiles('tools/kani/VERSION', 'Makefile') }}
      - name: Install Kani
        run: make install-kani
      - name: Kani version check
        run: make kani-check
