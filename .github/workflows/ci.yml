name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust: [stable, '1.89.0']
        # Nightly is experimental; stable and MSRV are the supported toolchains
        include:
          - os: ubuntu-latest
            rust: nightly
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      # Override rust-toolchain.toml to actually use the matrix toolchain
      RUSTUP_TOOLCHAIN: ${{ matrix.rust }}
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@9bb56186c3b09b4f86b1c65136769dd318469633  # v4.1.2
        with:
          # Full history so the deferred cs-coverage check step can reach
          # the pull request's merge base once the gate is wired in.
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - name: Show rustc version
        run: |
          rustup show
          rustc --version
          cargo --version
      - name: Show Ninja version
        run: ninja --version
      - name: Format
        run: make check-fmt
      - name: Cache Whitaker installer
        if: matrix.rust == 'stable'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        if: matrix.rust == 'stable'
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        if: matrix.rust == 'stable'
        run: make lint
      # Whitaker lints under its own pinned toolchain, so re-running it per
      # matrix leg repeats identical work; non-stable legs run Clippy only.
      - name: Lint (Clippy only)
        if: matrix.rust != 'stable'
        run: make lint-clippy
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          enable-cache: true
      - name: Cache shared spelling dictionary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            .typos-oxendict-base.json
            .typos-oxendict-base.toml
          key: oxendict-${{ runner.os }}-${{ matrix.rust }}-${{ hashFiles('typos.local.toml') }}-${{ github.run_id }}
          restore-keys: |
            oxendict-${{ runner.os }}-${{ matrix.rust }}-${{ hashFiles('typos.local.toml') }}-
      - name: Spelling
        run: make spelling
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Test
        run: make test
      - name: Test and Measure Coverage
        if: matrix.rust == 'stable'
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: lcov.info
          format: lcov
          # Compare changed-line coverage against the baseline written by
          # coverage-main.yml (caches saved on main are readable by every PR).
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        if: matrix.rust == 'stable' && env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/69281
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

  kani-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: stable
      CARGO_HOME: ${{ github.workspace }}/.kani-cargo
      KANI_HOME: ${{ github.workspace }}/.kani-home
    steps:
      - uses: actions/checkout@9bb56186c3b09b4f86b1c65136769dd318469633  # v4.1.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          toolchain: stable
      - name: Install uv
        uses: astral-sh/setup-uv@4cda7d73322c50eac316ad623a716f09a2db2ac7  # v3.1.2
      - name: Cache Kani tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            .kani-cargo
            .kani-home
          key: ${{ runner.os }}-kani-${{ hashFiles('tools/kani/VERSION', 'Makefile') }}
      - name: Install Kani
        run: make install-kani
      - name: Kani version check
        run: make kani-check
