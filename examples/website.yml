netsuke_version: "1.0.0"

vars:
  pages_dir: pages
  site_dir: site
  pages:
    - about
    - contact

rules:
  - name: page
    command: "pandoc {{ ins }} -o {{ outs }}"

  - name: index
    command: "pandoc --standalone {{ ins }} -o {{ outs }}"

targets:
  - foreach: pages
    name: "{{ site_dir }}/{{ item }}.html"
    rule: page
    sources: "{{ pages_dir }}/{{ item }}.md"

  - name: "{{ site_dir }}/index.html"
    rule: index
    sources:
      - "{{ pages_dir }}/about.md"
      - "{{ pages_dir }}/contact.md"

defaults:
  - site/index.html
  - site/about.html
  - site/contact.html
